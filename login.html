<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="./CSS/style.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <title>Login - Mar.é Semi jóias</title>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-rose" aria-label="Navegação principal">
        <div class="container-fluid">
            <img src="./images/logosemfundo.png" alt="Logo Mar.é Semi jóias" class="logo me-2">
        </div>
    </nav>

    <main class="main-content">
        <section class="hero-section" aria-label="Login do painel de vendas">
            <div class="hero-text">
                <p class="eyebrow">Acesso seguro</p>
                <h1>Entre para gerenciar suas vendas</h1>
                <p>Use a senha para acessar o painel e consultar o histórico de vendas, relatórios e lucro.</p>
            </div>
            <div class="card-glow auth-card">
                <form id="loginForm" class="sales-form" onsubmit="return false;">
                    <div class="form-group">
                        <label for="accessPassword" class="form-label">Senha de acesso</label>
                        <input type="password" id="accessPassword" class="form-control" autocomplete="current-password" placeholder="Digite a senha" required>
                    </div>
                    <div id="loginError" class="alert alert-danger py-2 d-none" role="alert"></div>
                    <div class="d-grid gap-2">
                        <button id="loginButton" type="button" class="btn btn-rose">Entrar no painel</button>
                    </div>
                    <p class="mt-3 text-muted small">Senha padrão: <strong>1234</strong>. Altere a senha no arquivo <code>login.html</code> se desejar.</p>
                </form>
            </div>
        </section>
    </main>

    <script>
        const AUTH_KEY = 'mareLoggedIn';
        const AUTH_PASSWORD = '1234';
        const accessPassword = document.getElementById('accessPassword');
        const loginButton = document.getElementById('loginButton');
        const loginError = document.getElementById('loginError');

        function showLoginError(message) {
            loginError.textContent = message;
            loginError.classList.remove('d-none');
        }

        function clearLoginError() {
            loginError.classList.add('d-none');
        }

        function handleLogin() {
            clearLoginError();
            if (!accessPassword.value.trim()) {
                showLoginError('Digite a senha para continuar.');
                return;
            }

            if (accessPassword.value === AUTH_PASSWORD) {
                localStorage.setItem(AUTH_KEY, 'true');
                window.location.href = './vendas.html';
            } else {
                showLoginError('Senha incorreta. Tente novamente.');
            }
        }

        loginButton.addEventListener('click', handleLogin);
        accessPassword.addEventListener('input', clearLoginError);

        window.addEventListener('load', () => {
            if (localStorage.getItem(AUTH_KEY)) {
                window.location.href = './vendas.html';
            }
        });
    </script>
</body>

</html>
